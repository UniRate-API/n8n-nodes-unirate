# Publishes this n8n community node package to npm on every version tag push.
#
# From May 1 2026, n8n requires all community nodes to be published via GitHub
# Actions with an npm provenance statement. This workflow satisfies that
# requirement: provenance lets anyone cryptographically verify that a published
# tarball was built by this exact workflow, from this exact repo and commit.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Pick ONE of the two authentication strategies below.
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com → packages → "n8n-nodes-unirate" → Settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: UniRate-API
#        Repository name:  n8n-nodes-unirate
#        Workflow name:    publish.yml
#        Environment:      (leave blank)
#   4. Leave the NPM_TOKEN secret unset in this repo. GitHub's OIDC token is
#      exchanged for a short-lived npm credential at publish time.
#
# Option B — npm Automation Token (fallback):
#   1. npmjs.com → Access Tokens → Generate New Token → Granular Access Token.
#      Scope it to this package with "Read and write" publish permission.
#   2. GitHub → Settings → Secrets and variables → Actions → New secret.
#      Name: NPM_TOKEN  Value: <token>
#
# Provenance is signed by GitHub's OIDC infrastructure either way.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
#   npm version patch          # or minor / major — bumps package.json + tags
#   git push origin main --tags
#
# The tag push triggers this workflow, which builds, lints, and publishes.

name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token used to sign the npm provenance attestation.
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish to npm with provenance
        # If NPM_TOKEN is unset, npm falls back to the OIDC token from the
        # `id-token: write` permission above (Trusted Publisher path).
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
